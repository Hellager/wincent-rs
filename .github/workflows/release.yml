name: Release Source Code

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to archive, for example v0.2.3"
        required: true
        type: string
  workflow_run:
    workflows: ["Build and Publish"]
    types:
      - completed

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Resolve release tag
        id: release_tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
          } else {
            $tag = git tag --points-at "${{ github.event.workflow_run.head_sha }}" |
              Where-Object { $_ -like 'v*' } |
              Select-Object -First 1
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "No v* tag found for this workflow run."
          }

          if (-not $tag.StartsWith("v")) {
            throw "Release tag must start with 'v'."
          }

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Extract release notes
        id: release_notes
        shell: pwsh
        run: |
          $tag = "${{ steps.release_tag.outputs.tag }}"
          $version = $tag.Substring(1)
          $changelog = Get-Content -LiteralPath "CHANGELOG.md" -Raw
          $pattern = "(?ms)^## \[$([regex]::Escape($version))\].*?(?=^## \[|\z)"
          $match = [regex]::Match($changelog, $pattern)

          if (-not $match.Success) {
            throw "No CHANGELOG.md entry found for $tag."
          }

          $notesPath = Join-Path $env:RUNNER_TEMP "release-notes.md"
          $match.Value.Trim() | Out-File -FilePath $notesPath -Encoding utf8
          "path=$notesPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          draft: true
          body_path: ${{ steps.release_notes.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
